<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}PulseWatch AI{% endblock %}</title>
  <style>
    :root {
      --background: #faf8f5;
      --card: #ffffff;
      --primary: #7cb686;
      --coral: #e8a598;
      --text-primary: #2d3142;
      --text-secondary: #6b7280;
      --error: #ef5350;
      --warning: #f59e0b;
      --border: #e5e7eb;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--background);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    header .logo {
      width: 36px; height: 36px;
      background: rgba(124,182,134,0.12);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    header .brand { font-weight: 700; font-size: 16px; }
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 20px 60px;
    }
    .card {
      background: var(--card);
      border-radius: 20px;
      padding: 36px 32px;
      max-width: 440px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }
    .card.wide { max-width: 760px; }
    h1 { font-size: 24px; font-weight: 800; letter-spacing: -0.3px; margin-bottom: 8px; }
    h2 { font-size: 18px; font-weight: 700; margin-bottom: 12px; }
    p { line-height: 1.6; color: var(--text-secondary); font-size: 14px; }
    .subtitle { margin-bottom: 24px; }
    a.button, button.button {
      display: inline-block;
      background: var(--primary);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      font-size: 15px;
      padding: 14px 24px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      text-align: center;
      width: 100%;
    }
    a.button.secondary, button.button.secondary {
      background: transparent;
      color: var(--text-primary);
      border: 1.5px solid var(--border);
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--background);
      font-size: 14px;
      margin-bottom: 14px;
      color: var(--text-primary);
    }
    label.field-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .error-box {
      background: rgba(239,83,80,0.08);
      border: 1px solid rgba(239,83,80,0.3);
      color: var(--error);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 13px;
      margin-bottom: 16px;
    }
    .success-box {
      background: rgba(124,182,134,0.08);
      border: 1px solid rgba(124,182,134,0.3);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .code-display {
      font-family: 'SF Mono', Consolas, monospace;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 4px;
      text-align: center;
      color: var(--primary);
      background: var(--background);
      border-radius: 12px;
      padding: 18px;
      margin: 12px 0;
    }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { text-align: left; padding: 10px 8px; border-bottom: 1px solid var(--border); }
    th { color: var(--text-secondary); font-weight: 600; font-size: 12px; }
    .muted { color: var(--text-secondary); font-size: 12px; }
    footer { text-align: center; padding: 20px; color: var(--text-secondary); font-size: 12px; }
  </style>
</head>
<body>
  <header>
    <div class="logo">❤️</div>
    <div class="brand">PulseWatch AI</div>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer>Cardiovascular research project — Politehnica University</footer>
</body>
</html>
